<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick WhatsApp</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    input {
      padding: 10px;
      width: 200px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Quick WhatsApp</h2>
    <input type="text" id="phone" placeholder="Enter phone number" onkeydown="if(event.key === 'Enter') openWhatsApp()" />
    <br />
    <button onclick="openWhatsApp()">Message</button>
  </div>

  <script>
    function openWhatsApp() {
      let phone = document.getElementById("phone").value.trim();

      if (!phone) {
        alert("Enter a number");
        return;
      }

      phone = phone.replace(/\D/g, ""); // clean input

      // Default to India country code if the user enters exactly 10 digits
      if (phone.length === 10) {
        phone = "91" + phone;
      }

      const url = `https://wa.me/${phone}`;
      window.open(url, "_blank");
    }
  </script>
</body>
</html>
